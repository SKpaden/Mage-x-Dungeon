<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mage x Dungeon</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <link rel="icon" type="image/jpg" href="assets/skill icons/Claw Strike.jpg">
    <script type="module" src="main.js"></script>
    <style>
        body{
            margin: 0;
            background-color: rgb(20, 20, 20);
        }
        canvas{
            display: block;
        }
    </style>
</head>
<body>
    <div id="canvas-parent" style="width: 100vw; height: 100vh; overflow: auto; min-width: 1200px; min-height: 900px;">

    </div>
</body>
<style>
body{
    --size: clamp(3rem, 8vw, 5rem); 
}
.scene-title{
    font-size: var(--size);
    color: white;
    margin: auto;
    left: 5%;
    right: 5%;
    text-align: center;
}
.scroll-text-container{
    flex: 0 1 auto;
    /* The above is shorthand for (source: https://stackoverflow.com/questions/90178/make-a-div-fill-the-height-of-the-remaining-screen-space):
    flex-grow: 0,
    flex-shrink: 1,
    flex-basis: auto
    */
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: rgba(25,25,25,0.5) transparent;
}
.global-btn{
    display: flex !important;  /* override Phaser's block display */
    align-items: center;
    justify-content: center;
    cursor: pointer;
    
    width: var(--size);
    height: var(--size);
    aspect-ratio: 1 / 1;
    
    /* Top right corner: */
    position: fixed !important;  /* override Phaser */

    background-color: rgb(122, 122, 122);
    color: white;
    border-radius: 50%;
    box-shadow: 5px 5px 5px rgb(20,20,20);
    
    font-size: calc(var(--size));
    
    /* Prevent selecting/highlighting of button symbol: */
    -webkit-user-select: none;  /* Safari */
    -ms-user-select: none;  /* IE 10 and IE 11 */
    user-select: none;  /* other browsers */
}
.global-btn:hover{
    background-color: rgb(185, 185, 185);
}
.global-btn:active{
    background-color: rgb(204, 204, 204);
}
.back-btn{
    /* Top right corner: */
    top: 1rem;
    left: 1rem;

    font-size: calc(var(--size)*3/4);
}
/* COLLECTION: */
.collection-container{
    display: flex !important;
    width: 100%;
    height: 100%;
    padding: 1%;
    padding-top: calc(var(--size) + 2rem);
    box-sizing: border-box;
}
.collection-container img{
    box-shadow: 5px 5px 5px rgb(20, 20, 20);
}
#collection-list{
    display: grid;
    grid-template-columns: 25% 25% 25% 25%;  /* force 25%, even when less present */
    grid-auto-rows: max-content;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: rgba(25,25,25,0.5) transparent;
    width: 28%;
    height: 100%;
    padding: 3px;
    box-sizing: border-box;
    background-color: rgb(122, 122, 122);
    border: 2px solid gold;
}
#collection-inspect{
    display: flex;
    flex-wrap: wrap;
    align-content: flex-start;
    width: 70%;
    padding: 5px;
    box-sizing: border-box;
    margin-left: 2%;
    background-color: rgb(122, 122, 122);
    border: 2px solid gold;
}
.collection-list-entry{
    padding: 2px;
    box-sizing: border-box;
    height: fit-content;
}
/* Small effect when clicking: */
.collection-list-entry:active{
    scale: 0.9;
}
/* Collection portraits: */
.collection-list-img{
    box-sizing: border-box;
    border: 0.2rem solid darkgray;
    /* box-shadow: 5px 5px 5px rgb(20, 20, 20); */
    border-radius: 5px;
    max-width: 100%; /* I only need mas-width because size is determined by columns */
    cursor: pointer;
}
.collection-list-img:hover{
    border: 0.2rem solid gold;
    /* animation: pulseCollectionBorder 1s ease-in-out infinite; */
}
/* For later some select animation: */
@keyframes pulseCollectionBorder {
    0% { border-top: 0.2rem solid rgb(13, 0, 128); }  /* green border */
    33% { border-right: 0.2rem solid rgb(13, 0, 128); }  /* fade to no border */
    66% { border-bottom: 0.2rem solid rgb(13, 0, 128); }
    100% { border-left: 0.2rem solid rgb(13, 0, 128); }
}
.collection-container img.selected{
    border: 0.2rem solid rgb(0, 200, 0);
}
/* Collection inspect (detailed hero display): */
.collection-inspect-images{
    display: flex;
    max-height: 70%;
}
#collection-inspect-portrait{
    max-width: 30%;
    max-height: 100%;
}
img.collection-inspect-img{
    max-width: 100%;
    max-height: 100%;
    border: 0.2rem solid gold;
    box-sizing: border-box;
    border-radius: 5px;
}
/* Skills: */
#collection-inspect-skill-wrapper{
    width: 68%;
    margin-left: 2%;
    display: flex;
    flex-direction: column;
}
#collection-inspect-skills{
    display: grid;
    grid-template-columns: 25% 25% 25% 25%;
    grid-auto-rows: max-content;
    width: 100%;
    padding: 5px;
    box-sizing: border-box;
}
.collection-inspect-skill{
    padding: 1rem;
    box-sizing: border-box;
}
img.collection-inspect-icon{
    width: 100%;
    aspect-ratio: 1 / 1;
    cursor: pointer;
}
img.collection-inspect-icon:hover{
    border: 0.2rem solid gold;
}
img.collection-inspect-icon:active{
    scale: 0.9;
}
#skill-description{
    padding: 1rem;
    border: 2px solid white;
    box-sizing: border-box;
    flex: 1 1 auto;
}
/* Text content: */
.collection-inspect-description{
    display: flex;
    flex-direction: column;
    width: 100%;
    height: 19%;
    margin-top: 1%;
    padding: 1rem;
    box-sizing: border-box;
    border: 2px solid white;
}
.collection-inspect-description h3{
    margin: 0;
    margin-bottom: 1rem;
}
.collection-inspect-tags{
    width: 100%;
    height: 10%;
    text-align: center;
}
.collection-inspect-tags h3{
    padding-bottom: 1%;
    margin: 0;
}
.collection-inspect-tags span{
    margin: 0 2%;
    background-color: rgb(20, 20, 20);
    border-radius: 5px;
    color: white;
    padding: 5px;
}

/* ----------------------------------------------------------------------------------------------------------------------------------------------------- */
/* MENU BUTTON: */
.top-menu-btn {
    /* Top right corner: */
    top: 1rem;
    right: 1rem;
}
/* Open menu: */
.base-menu{
    padding: 2rem;
    box-sizing: border-box;
    position: fixed !important;
    --wsize: clamp(20rem, 40vw, 100rem); 
    --hsize: clamp(40rem, 80vh, 100rem);
    width: var(--wsize);
    height: var(--hsize);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) !important;
    
    background-color: rgba(43, 43, 43, 0.7);
    color: rgb(206, 75, 0);
    border-radius: 2%;
        
    justify-content: center;
    align-items: top;
    text-align: center;
}
.base-menu.hidden{
    display: none !important;
}
.base-menu-options{
    display: flex;
    flex-direction: column;
    height: 80%;
    justify-content: center;
}
.base-menu-option{
    width: 100%;
    height: 20%;
    padding: 1rem 0;
    box-sizing: border-box;
}
.base-menu #base-menu-title{
    height: 20%;
    font-size: 5rem;
    margin-bottom: 0;
    margin-top: 0;
}
.base-menu-button{
    width: 100%;
    height: 100%;
    color: rgb(206, 75, 0);
    background-color: rgb(90, 89, 89);
    font-size: x-large;
    cursor: pointer;
}
.base-menu-button:hover{
    background-color: rgb(114, 114, 114);

}
.base-menu-button:active{
    background-color: rgb(151, 150, 150);

}
/* ----------------------------------------------------------------------------------------------------------------------------------------------------- */
/* TEAM SELECTOR: */

/* Collection container: */
.collection{
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: rgba(25,25,25,0.5) transparent;
}
.collection-select{
    display: flex !important; /* override Phaser's block display */
    flex-wrap: wrap;
    border: 3px solid rgb(48, 47, 47);
    border-radius: 5px;
}
.collection-select-hero{
    width: 10%;
    min-width: 10%;
    padding: 5px;
    box-sizing: border-box;
}
.collection-select img.collection-select-img{
    width: 100%;
    box-sizing: border-box;
    border: 3px solid rgb(48, 47, 47);
    border-radius: 5px;
    cursor: pointer;
}
img.collection-select-img:hover{
    border: 3px solid white;
}
/* Selected hero: */
img.collection-select-img.selected{
    border: 3px solid rgb(4, 247, 4);
    border-radius: 5px;
}
img.collection-select-img.selected:hover{
    border: 5px solid white;
}
/* Selected team: */
#selected-team-container{
    display: flex !important;
    padding: 5px;
    border: 5px solid rgb(51, 48, 48);
    border-radius: 5px;
}
#selected-team-container .selected-team-member{
    display: flex;
    align-items: center;
    justify-content: center;
    max-width: 20%;
    padding: 2px;
    box-sizing: border-box;
}
#selected-team-container .selected-team-member img{
    max-width: 100%;
    max-height: 100%;
    box-sizing: border-box;
    border: 3px solid gold;
    border-radius: 5px;
    cursor: pointer;
}
#selected-team-container .selected-team-member img:hover{
    border: 5px solid red;
}

#team-select-battle-btn-container{
    background-color: transparent;
}
#team-select-battle-btn {
    text-align: center;
    border: 5px solid darkgray;
    border-radius: 5px;
    width: 100%;
    height: 100%;
    color: darkgray;
    font-size: 2rem;
}
#team-select-battle-btn.active {
    color: orangered;
    border: 5px solid orangered;
    animation: pulseGreenBorder 2s infinite;
    cursor: pointer;
}
/* Add fade-in and out effect to make the button more visible: */
@keyframes pulseGreenBorder {
    0% { border: 5px solid orangered; }  /* green border */
    50% { border: 5px solid yellow; }  /* fade to no border */
    100% { border: 5px solid orangered; }
}

/* ----------------------------------------------------------------------------------------------------------------------------------------------------- */

.combat-log{
    max-width: 400px;
    max-height: 160px;
}
.skill-tooltip{
    width: 15vw;
    height: 10vh;
    max-width: 300px;
    max-height: 150px;
    background: rgba(0,0,0,0.65);
    color: #e0e0e0;
    font-family: Arial, sans-serif;
    font-size: 14px;
    padding: 12px;
    overflow-y: auto;
    border-radius: 8px;
    line-height: 1.4;
}
</style>
</html>
