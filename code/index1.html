<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <style>
        body{
            margin: 0;
            background-color: rgb(20, 20, 20);
        }
        canvas{
            display: block;
        }
    </style>
</head>
<body>
    
</body>
</html>

<script>
    var config = {
        type: Phaser.AUTO,
        scale: {
            width: '100%',
            height: '100%'
        },
        scene: {
            preload: preload,
            create: create,
            update: update
        }
    }

    var game = new Phaser.Game(config);

    function preload()
    {
        // Portraits:
        this.load.image('my-hero', 'assets/portraits/Draconoid - Dark Mage.jpg');
        this.load.image('hero2', 'assets/portraits/Dragon Queen - Blue.jpg');
        this.load.image('hero3', 'assets/portraits/Draconoid - Warrior.jpg');
        this.load.image('hero4', 'assets/portraits/Dragon Queen - Poison.jpg');
        this.load.image('hero5', 'assets/portraits/Draconoid - Necromancer.jpg');

        // SKills:
        this.load.image('Dark Nova.jpg', 'assets/skill icons/Dark Nova.jpg');
        this.load.image('Fireball.jpg', 'assets/skill icons/Fireball.jpg');
        this.load.image('Holy Light.jpg', 'assets/skill icons/Holy Light.jpg');
        this.load.image('Poison Claw.jpg', 'assets/skill icons/Poison Claw.jpg');

        // Backgrounds:
        this.load.image('battlefield', 'assets/backgrounds/battlefield.jpg');
    }
    function create()
    {
        // const COLOR_NORMAL = 0x444444;
        // const COLOR_ACTIVE = 0x181818;

        // const rectangle = this.add.rectangle(this.scale.width/4, this.scale.height/2, 300, 60, COLOR_NORMAL).setInteractive({ useHandCursor: true });
        // rectangle.on('pointerdown', () => {
        //     toggleColor(rectangle);
        //     message.setText('Left rectangle clicked!');
        // });

        // const rectangle2 = this.add.rectangle(3*this.scale.width/4, this.scale.height/2, 300, 60, COLOR_NORMAL).setInteractive({ useHandCursor: true});
        // rectangle2.on('pointerdown', () => {
        //     toggleColor(rectangle2);
        //     message.setText('Right rectangle clicked!');
        // });

        // // Toggles rectangle's color:
        // function toggleColor(rectangle){
        //     if(rectangle.fillColor === COLOR_NORMAL){
        //         rectangle.setFillStyle(COLOR_ACTIVE);
        //     } else {
        //         rectangle.setFillStyle(COLOR_NORMAL);
        //     }
        // }
        
        //////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////
        // GAME STATS:

        const gameState = {
            turn: 'player',
            selectedPlayer: null,  // player team character's turn
            selectedEnemy: null,  // player's selected target
            pendingSkill: null,  // skill to be used
            playerContainers: [],  // player team
            enemyContainers: [],  // enemy team
            turnQueue: [],  // turn order
            currentTurnIndex: -1,  // 
            playerAlive: null,  // how many alive on player team
            enemyAlive: null,  // how many enemies alive
            winner: null
        };

        const uiStats = {
            margin: 50,  // general margin, mostly for spacing portraits
            marginPortraitHpBar: 5,  // how much space between hp bar and portrait
            paddingHpBar: 3,  // how much padding of HP bar rectangle (outer vs inner bar)
            hpBarHeight: 30,
            borderRadius: 5,
            skillIconScale: 0.05,
            skillIconDims: 32,
            portraitScale: 0.3,
        };

        const tempBg = this.make.image({
            key: 'battlefield',
            x: 0,
            y:0,
            add: false
        });

        // Background:
        const bgWidth = tempBg.displayWidth;
        const coverRatio = this.scale.width/bgWidth;  // how to cover whole screen?
        tempBg.destroy();
        this.add.image(this.scale.width/2, this.scale.height/2, 'battlefield').setScale(coverRatio).setTint(0x202020);

        //////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////
        
        // Text display:
        const message = this.add.text(this.scale.width/2, this.scale.height *0.5, 'Click a rectangle!', { fontSize: '32px', color: '#ffffff'}).setOrigin(0.5);
        const turnText = this.add.text(this.scale.width*0.85 + uiStats.margin,
                                       this.scale.height/2, 'Player Turn', { fontSize: '36px', color: '#00ff00' }).setOrigin(0.5);
        // TEAM:
        // Get display dimensions without displaying image:
        const tempPortrait = this.make.image({
            x: 0,
            y: 0,
            key: 'my-hero',
            scale: uiStats.portraitScale,
            add: false  // <- crucial: do NOT add to scene
        });

        const portraitWidth = tempPortrait.displayWidth;
        const portraitHeight = tempPortrait.displayHeight;

        // No need to destroy, it was never added...
        const halfW = portraitWidth / 2;
        const halfH = portraitHeight / 2;

        initBattle(this);
        advanceToNextTurn(this);

        // Decides who acts next in turn order.
        function advanceToNextTurn(scene){
            let check = true;
            let currentUnit;
            while (check){
                gameState.currentTurnIndex = (gameState.currentTurnIndex + 1) % gameState.turnQueue.length;
                currentUnit = gameState.turnQueue[gameState.currentTurnIndex];
                if (currentUnit.getData('hp') > 0) check = false;
                
            }

            if(currentUnit.getData('team') === 'player'){
                gameState.turn = 'player';
                updateText(turnText, "Player Turn", '#00ff00');
                playerTurn(scene, currentUnit);

            } else {
                gameState.turn = 'enemy';
                updateText(turnText, "Enemy Turn", '#ED0000');
                scene.time.delayedCall(1000, () => enemyTurn(scene, currentUnit));
            }
        }

        // Processes player's turn.
        function playerTurn(scene, unit){
            const tween = getPortraitTween(scene, unit);
            tween.play();
            setHighlight(unit,true);
            showSkills(scene, unit);
        }

        // End turn of unit. Cleans up state and triggers next turn.
        function endTurn(scene, unit){
            //processDebuffs(scene, unit);
            //processBuffs(scene, unit);
            clearSelections();
            advanceToNextTurn(scene);
        }

        // Displays skills of current player character selected.
        function showSkills(scene, container){
            const skills = container.getData('skills');
            const containerHeight = container.getData('displayHeight');
            const y = container.y + containerHeight/2 - 35;
            const buttonWidth = uiStats.skillIconDims;
            const spacing = 20;
            // offset + CENTER-BASED POSITIONING - spaceNeeded/2:
            const startX = container.x + buttonWidth/2 - (skills.length * buttonWidth + (skills.length - 1) * spacing) / 2;
        
            const obejctsToDestroy = [];
            skills.forEach((skill, i) => {
                const btn = scene.add.rectangle(startX + i * (buttonWidth + spacing), y, buttonWidth, buttonWidth, 0x333333);
                const skillText = scene.add.text(btn.x, btn.y - 40, skill.name, { fontSize: '16px', color: '#fff' }).setOrigin(0.5).setVisible(false);
                btn.setInteractive({ useHandCursor: true })
                    .on('pointerdown', () => {
                        gameState.pendingSkill = skill;
                        message.setText(`Use ${skill.name}? Hover enemies!`);
                        destroySkillButtons(obejctsToDestroy);  // Clean up
                    })
                    .on('pointerover', () => skillText.setVisible(true))  // Tooltip
                    .on('pointerout', () => skillText.setVisible(false)); 

                const icon = scene.add.image(btn.x, btn.y, skill.icon).setScale(uiStats.skillIconScale);
                btn.icon = icon;  // For destroy
                btn.text = skillText;
                obejctsToDestroy.push(btn);
            });
        }


        // Removes skills from screen.
        function destroySkillButtons(objects) {
            objects.forEach(btn => {
                btn.icon.destroy();
                btn.text.destroy();
                btn.destroy();
            });
        }

        // Shows visual cue (tint) on all targets that would be affected by gameState.pendingSkill.
        function previewTargets(skill, index){
            const affectedTargets = getAffectedTargets(skill, index, gameState.enemyContainers);
            gameState.enemyContainers.forEach((enemy, i) => {
                const isAffected = affectedTargets.includes(i) && enemy.getData('hp') > 0;
                enemy.list[0].setTint(isAffected ? 0xff4444 : 0x88ccff);  // Red for affected, blue for valid
            });
        }

        // Gets indeces of all from gameState.pendingSkill affected targets.
        function getAffectedTargets(skill, hoveredIndex, team){
            if (skill['targets'] === 'single') return [hoveredIndex];
            else if (skill['targets'] === 'all'){
                const indeces = [];
                team.forEach(enemy => {
                    if (enemy.getData('hp') > 0) indeces.push(enemy.getData('teamIndex'));
                });
                return indeces;
            } else {  // 'adjacent'
                const adj = [hoveredIndex - 1, hoveredIndex, hoveredIndex + 1];
                return adj.filter(i => (i >= 0 && i < team.length && team[i].getData('hp') > 0));
            }
        }

        // Removes tints from preview targets.
        function clearAffectedTargets(){
            gameState.enemyContainers.forEach(container => {
                container.list[0].clearTint();
            });
        }
    

        // Processes enemy turn.
        function enemyTurn(scene, unit){
            attackLowestPlayer(scene, unit);
            
            endTurn(scene, unit);
        }

        // Initialises battle.
        function initBattle(scene){
            initPlayerTeam(scene);
            initEnemyTeam(scene);
            buildQueue(gameState.playerContainers, gameState.enemyContainers);
        }

        // Initialises player team.
        function initPlayerTeam(scene){
            const portraits = ['my-hero', 'hero2', 'hero3', 'hero4', 'hero5'];  // array of portraits
            const heroNames = ['Dark Mage', 'Blue Dragon Queen', 'Draconoid Warrior', 'Poison Dragon Queen', 'Necromancer'];
            gameState.playerAlive = portraits.length;
    
            const spaceNeeded = portraits.length * portraitWidth + (portraits.length-1)*uiStats.margin;  // #portraits*width + margins between them
            const whiteSpacePerSide = (scene.scale.width - spaceNeeded)/2;  // how much space on either side? (for xPos of first portrait)
            var xPos = whiteSpacePerSide + portraitWidth/2;  // REMEMBER: CENTER-BASED POSITIONING!
            for (let index = 0; index < portraits.length; index++) {
                const container = createHeroPortrait(scene, xPos, 200, portraits[index], uiStats.portraitScale,  // location and size
                                                    Math.floor(Math.random() * 250 + 1), index+1, heroNames[index], 'player', index);  // stats
                xPos+=portraitWidth + uiStats.margin;  // enough spacing with margin   
                gameState.playerContainers.push(container);
            }

        }

        // Initialises enemy team.
        function initEnemyTeam(scene){
            const enemies = ['hero5', 'hero5', 'hero5', 'hero5', 'hero5'];
            const enemyNames = ['Grunt1', 'Grunt2', 'Grunt3', 'Grunt4', 'Grunt5'];
            gameState.enemyAlive = enemies.length;
            
            const spaceNeeded = enemies.length * portraitWidth + (enemies.length-1)*uiStats.margin;  // #portraits*width + margins between them
            const whiteSpacePerSide = (scene.scale.width - spaceNeeded)/2;  // how much space on either side? (for xPos of first portrait)
            var xPos = whiteSpacePerSide + portraitWidth/2;
    
            const yOffset = scene.scale.height-200-30;
            for (let index = 0; index  < enemies.length; index++) {
                const container = createEnemyPortrait(scene, xPos, yOffset, enemies[index], uiStats.portraitScale,  // location and size
                                                      100, 2, enemyNames[index], 'enemy', index);  // stats
                xPos+= portraitWidth + uiStats.margin;
                gameState.enemyContainers.push(container);
            }
        }

        // Builds the turnQueue in gameState to decide turn order.
        function buildQueue(players, enemies){
            gameState.turnQueue = [...gameState.playerContainers, ...gameState.enemyContainers]
                .sort((a, b) => b.getData('speed') - a.getData('speed'));
            gameState.currentTurnIndex = -1;
        }

        function disableButton(button, btnText){
            button.setFillStyle(0x333333);  // gray out
            btnText.setColor('#888888');
            button.disableInteractive();
        }
        function enableButton(button, btnText){
            button.setFillStyle(0x444444);
            btnText.setColor('#ffffff');
            button.setInteractive( { useHandCursor: true});
        }

        // Applies skill to current target.
        function applySkill(scene, index){
            if (gameState.turn === 'player'){
                applySkillToEnemy(scene, index);
            } else {
                applySkillToPlayer(scene, index);
            }
            clearSelections();
        }

        // Applies pendingSkill to enemy at index.
        function applySkillToEnemy(scene, index){
            const skill = gameState.pendingSkill;
            const affectedTargets = getAffectedTargets(skill, index, gameState.enemyContainers);

            affectedTargets.forEach(i => {
                dmgTarget(scene, skill['dmg'], gameState.selectedPlayer, gameState.enemyContainers[i]);
            })
        }



        //////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////
        // CONTAINER CONSTRUCTION:

        // Creates a character portrait in the scene.
        function createHeroPortrait(scene, x, y, imageKey, scale, maxHp, speed, name, team, index){
            const portraitContainer = createCharacterContainer(scene, x, y, imageKey, scale, maxHp, speed, name, team, index);           
            return portraitContainer;
        }

        // Creates enemy portraits.
        function createEnemyPortrait(scene, x, y, imageKey, scale, maxHp, speed, name, team, index){
            const portraitContainer = createCharacterContainer(scene, x, y, imageKey, scale, maxHp, speed, name, team, index);

            portraitContainer.on('pointerdown', () => {
                // Player chose a character AND it's the player's turn AND this target is not dead...
                if (gameState.turn === 'player'  && portraitContainer.getData('hp') > 0 && gameState.pendingSkill){
                    applySkill(scene, portraitContainer.getData('teamIndex'));
                    //dmgTarget(scene, 50, gameState.selectedPlayer, portraitContainer);
                    endTurn(scene);                
                }
            });

            return portraitContainer;
        }

        // Creates base layout and strucuture for a character container.
        function createCharacterContainer(scene, x, y, imageKey, scale, maxHp, speed, name, team, index){
            if(!scene.textures.exists(imageKey)){
                console.warn(`Failed to load ${imageKey}!`);
            }
            const portrait = scene.add.image(0, 0, imageKey).setScale(scale);
            const halfW = portrait.displayWidth/2;
            const halfH = portrait.displayHeight/2;

            var borderGraphics = createBorderGraphics(scene, -halfW, -halfH, portrait.displayWidth, portrait.displayHeight, 5, 0xFFE836);
            
            // HP BARS:
            var hpGraphics = createHpGraphics(scene, -halfW, halfH + uiStats.marginPortraitHpBar, portrait.displayWidth,
                                              uiStats.hpBarHeight, uiStats.borderRadius, 0xBDB9B9, 0xDE1616, 1);

            // y = halfH + marginPortraitBar + redBar.height/2 + paddingGreyBar = halfH + 5 + 12 + 3 = halfH + 20
            const hpText = createHpText(scene, 0, halfH + 20, `${maxHp}/${maxHp}`, {fontSize: '14px', color: '#000000', fontFamily: 'Arial'});
            
            const portraitContainer = scene.add.container(x, y);  // previous portrait location

            // Add all children to the container (order matters!):
            addToContainer(portraitContainer, [portrait, borderGraphics, hpGraphics, hpText]);  // order matter!

            // Make the container interactive:
            setContainerInteractive(portraitContainer, portrait,
                                    {
                                        hitArea: new Phaser.Geom.Rectangle(-halfW, -halfH, portrait.displayWidth,portrait.displayHeight),
                                        hitAreaCallback: Phaser.Geom.Rectangle.Contains,
                                        useHandCursor: true
                                    }, 0x820000);
            
            
            // Skills:
            const skills = [
                { id: 'basicAttack', name: 'Posion Claw', icon: 'Poison Claw.jpg', targets: 'single', dmg: 40 },
                { id: 'fireball', name: 'Fireball', icon: 'Fireball.jpg', targets: 'single', dmg: 60, element: 'fire' },
                { id: 'holy', name: 'Holy Light', icon: 'Holy Light.jpg', targets: 'adjacent', dmg: 35 },
                { id: 'nova', name: 'Dark Nova', icon: 'Dark Nova.jpg', targets: 'all', dmg: 25 }
            ];
            // Store data in container:
            setContainerData(portraitContainer, {
                'name': name,
                'halfW': halfW,
                'halfH': halfH,
                'displayWidth': portrait.displayWidth,
                'displayHeight': portrait.displayHeight,
                'hpGraphics': hpGraphics,
                'borderGraphics': borderGraphics,
                'hpText': hpText,
                'hp': maxHp,
                'maxHp': maxHp,
                'speed': speed,
                'skills': skills,
                'team': team,
                'teamIndex': index
            });

            return portraitContainer;
        }

        // Sets hover interactivity to container portraits.
        function setContainerInteractive(container, portrait, options, tint){
            container.setInteractive(options).on('pointerover', () => {
                if(gameState.pendingSkill && gameState.turn === 'player'){
                    previewTargets(gameState.pendingSkill, container.getData('teamIndex'));
                } else {
                    portrait.setTint(tint);
                }
            })
                                             .on('pointerout', () => {
                                                if(gameState.pendingSkill && gameState.turn === 'player'){
                                                    clearAffectedTargets();
                                                } else {
                                                    portrait.clearTint();
                                                }
                                            });
        }

        // Creates a border graphics object and returns it.
        function createBorderGraphics(scene, x, y, width, height, borderRadius, color){
            const borderGraphics = scene.add.graphics();
            borderGraphics.lineStyle(2, color, 1);

            borderGraphics.strokeRoundedRect(x, y, width, height, borderRadius);
            return borderGraphics;
        }

        // Creates aan hp graphics object and returns it.
        function createHpGraphics(scene, x, y, width, height, borderRadius, colorOuter, colorInner, hp){
            // HP BARS:
            var hpGraphics = scene.add.graphics();
            // Grey background:
            hpGraphics.fillStyle(colorOuter, 1.0);
            hpGraphics.fillRoundedRect(x, y, width, height, borderRadius);  // x,y,width,height,border radius

            const pad = uiStats.paddingHpBar;

            // Red bar:
            if (hp > 0){  // otherwise weird red pixels
                hpGraphics.fillStyle(colorInner, 1.0);
                hpGraphics.fillRoundedRect(x + pad, y + pad, (width - 2*pad) * hp, height - 2*pad, borderRadius);
            }
            return hpGraphics;
        }

        // Creates aan hp text object and returns it.
        function createHpText(scene, x, y, text, fontOptions){
            const hpText = scene.add.text(x, y, text, fontOptions).setOrigin(0.5);
            return hpText;
        }

        // Updates text and color of text object.
        function updateText(object, newText, color){
            object.setText(newText);
            object.setColor(color);
        }

        // Adds each object within the objects array to the container.
        function addToContainer(container, objects){
            objects.forEach(element => {
                container.add(element);
            });
        }

        // Sets data specified in dataDictionary in container.
        function setContainerData(container, dataDictionary){
            for (const [key, value] of Object.entries(dataDictionary)) {
                container.setData(key, value);
            }
        }

        // Return a reusable tween for portrait clicks.
        function getPortraitTween(scene, container){
            return scene.tweens.add({
                        targets: container,
                        scale: '+=0.1',
                        duration: 150,
                        yoyo: true,  // return to starting state
                        ease: 'Sine.easeOut',
                        paused: true,  // don't play immediately
                        persist: true,  // necessary when calling play(), otherwise it gets completed and can't be called again
                        onComplete: () => {
                            container.setScale(1);  // force exact reset, safer
                        }
                    });
        }

        //////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////
        // HELPER FUNCTIONS:

        // Highlights a portrait as selected or removes the highlight.
        function setHighlight(container, enable) {
            const graphics = container.getData('borderGraphics');
            const halfW = container.getData('halfW');
            const halfH = container.getData('halfH');
            const portraitWidth = container.getData('displayWidth');
            const portraitHeight = container.getData('displayHeight');
            graphics.clear();
            if (enable) { // no recursive call ==> triggered from a click
                if(gameState.selectedPlayer && gameState.selectedPlayer === container){  // same container twice in a row
                    graphics.lineStyle(2, 0xFFE836, 1);  // base border
                    graphics.strokeRoundedRect(-halfW, -halfH, portraitWidth, portraitHeight, 5);
                    gameState.selectedPlayer = null;  // reset
                    return;  // break
                }
            }
            graphics.lineStyle(enable ? 6 : 2, enable ? 0xffffff : 0xFFE836, 1);
            graphics.strokeRoundedRect(-halfW, -halfH, portraitWidth, portraitHeight, 5);  // redraw
            if (enable){
                if(gameState.selectedPlayer) {
                    setHighlight(gameState.selectedPlayer, false);  // remove old selected
                }
                gameState.selectedPlayer = container;  // update selected
            }
        }

        //////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////
        // COMBAT:

        // Computer attacks the current lowest player character.
        function attackLowestPlayer(scene, source){
            let minHp = 999;
            let target = null;
            for (let i = 0; i < gameState.playerContainers.length; i++){
                const player = gameState.playerContainers[i];
                const playerHp = player.getData('hp');
                if (playerHp > 0 && playerHp < minHp){
                    minHp = playerHp;
                    target = player;
                }
            }
            if (target){
                return dmgTarget(scene, 10, source, target);
            } else {
                console.error('No target with >0 hp left!');
                return;
            }
        }

        // Checks if the target died.
        function checkDeath(scene, target){
            const remainingHp = target.getData('hp');
            const team = target.getData('team');
            if (remainingHp <= 0){
                team === 'player' ? gameState.playerAlive-=1 : gameState.enemyAlive-=1;
                if (checkWinner()) {
                    endBattle();
                }
            }
        }

        // Checks if there is a winner.
        function checkWinner(){
            if(gameState.playerAlive === 0){
                gameState.winner = 'enemy';
                return true;
            } else if(gameState.enemyAlive === 0){
                gameState.winner = 'player';
                return true;
            }
            return false;  // no winner
        }

        // Clears gameState for next turn.
        function clearSelections(){
            const hero = gameState.selectedPlayer;
            if(hero){
                setHighlight(hero, false);
            }
            clearAffectedTargets();
            gameState.pendingSkill = null;
            gameState.selectedEnemy = null;
            gameState.selectedPlayer = null;
        }

        // Source deals dmg damage to target.
        function dmgTarget(scene, dmg, source, target){
            const sourceName = source.getData('name');
            const targetName = target.getData('name');
            const currentHp = target.getData('hp');
            const newHp = Math.max(0, (currentHp - dmg));
            updateHP(target, newHp);

            const enemyX = target.x;
            const enemyY = target.y;
            showDmgPopup(scene, enemyX, enemyY, `-${dmg}`, { fontSize: '32px', color: '#ED0000'});

            message.setText(`${sourceName} dealt ${dmg} damage to ${targetName}!`);

            checkDeath(scene, target);

            //clearSelections();
            return newHp > 0 ? true : false;
        }

        // Ends battle after it's over.
        function endBattle(){
            if (gameState.winner === 'enemy'){
                message.setText("You lost!");
                message.setColor('#ED0000');
            } else {
                message.setText("You win!");
                message.setColor('#00ff00');
            }
            // more stuff to do later...
        }

        // Shows a dmg popup on target location.
        function showDmgPopup(scene, x, y, text, textOptions){
            const dmgText = scene.add.text(x, y, text, textOptions).setOrigin(0.5);
            scene.tweens.add({
                targets: dmgText,
                y: '-=30',
                alpha: 0,
                duration: 800,
                onComplete: () => dmgText.destroy()
            });
        }

        // Updates HP of target container to newHp.
        function updateHP(container, newHp) {
            const hpGraphics = container.getData('hpGraphics');
            const halfW = container.getData('halfW');
            const halfH = container.getData('halfH');
            const displayWidth = container.getData('displayWidth');
            const maxHp = container.getData('maxHp');
            hpGraphics.clear();
            // Redraw grey bg:
            hpGraphics.fillStyle(0xBDB9B9, 1.0);
            hpGraphics.fillRoundedRect(-halfW, halfH + 5, displayWidth, 30, 5);
            // Redraw red fill:
            if (newHp > 0) {
                hpGraphics.fillStyle(0xDE1616, 1.0);
                const barWidth = (displayWidth - 6) * (newHp/maxHp);
                hpGraphics.fillRoundedRect(-halfW + 3, halfH + 5 + 3, barWidth, 24, 5);
            } else {
                newHp = 0;
                container.setAlpha(0.4);
            }

            // Update text:
            const hpText = container.getData('hpText');
            hpText.setText(`${newHp}/${maxHp}`);
            container.setData('hp', newHp);
        }
        
    }
    function update(){}
</script>
