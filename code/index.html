<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mage x Dungeon</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <link rel="icon" type="image/jpg" href="assets/skill icons/Claw Strike.jpg">
    <script type="module" src="main.js"></script>
    <style>
        body{
            margin: 0;
            background-color: rgb(20, 20, 20);
        }
        canvas{
            display: block;
        }
    </style>
</head>
<body>
    <div id="canvas-parent" style="width: 100vw; height: 100vh; overflow: auto; min-width: 1200px; min-height: 900px;">

    </div>
</body>
<style>
/* ----------------------------------------------------------------------------------------------------------------------------------------------------- */
/* TEAM SELECTOR: */

/* Collection container: */
.collection-select{
    display: flex !important; /* override Phaser's block display */
    flex-wrap: wrap;
    border: 3px solid rgb(48, 47, 47);
    border-radius: 5px;
}
.collection-select-hero{
    width: 10%;
    min-width: 10%;
    padding: 5px;
    box-sizing: border-box;
}
.collection-select img.collection-select-img{
    width: 100%;
    box-sizing: border-box;
    border: 3px solid rgb(48, 47, 47);
    border-radius: 5px;
}
img.collection-select-img:hover{
    border: 3px solid white;
}
/* Selected hero: */
img.collection-select-img.selected{
    border: 3px solid rgb(4, 247, 4);
    border-radius: 5px;
}
img.collection-select-img.selected:hover{
    border: 5px solid white;
}
/* Selected team: */
#selected-team-container{
    display: flex !important;
    padding: 5px;
    border: 5px solid rgb(51, 48, 48);
    border-radius: 5px;
}
#selected-team-container .selected-team-member{
    display: flex;
    align-items: center;
    justify-content: center;
    max-width: 20%;
    padding: 2px;
    box-sizing: border-box;
}
#selected-team-container .selected-team-member img{
    width: 100%;
    max-height: 100%;
    box-sizing: border-box;
    border: 3px solid gold;
    border-radius: 5px;
}
#selected-team-container .selected-team-member img:hover{
    border: 5px solid red;
}

#team-select-battle-btn-container{
    background-color: transparent;
}
#team-select-battle-btn {
    text-align: center;
    border: 5px solid darkgray;
    border-radius: 5px;
    width: 100%;
    height: 100%;
    color: darkgray;
    font-size: 2rem;
}
#team-select-battle-btn.active {
    color: orangered;
    border: 5px solid orangered;
    animation: pulseGreenBorder 2s infinite;
}
/* Add fade-in and out effect to make the button more visible: */
@keyframes pulseGreenBorder {
    0% { border: 5px solid orangered; }  /* green border */
    50% { border: 5px solid yellow; }  /* fade to no border */
    100% { border: 5px solid orangered; }
}

/* ----------------------------------------------------------------------------------------------------------------------------------------------------- */

.combat-log{
    max-width: 400px;
    max-height: 160px;
}
.skill-tooltip{
    width: 15vw;
    height: 10vh;
    max-width: 300px;
    max-height: 150px;
    background: rgba(0,0,0,0.65);
    color: #e0e0e0;
    font-family: Arial, sans-serif;
    font-size: 14px;
    padding: 12px;
    overflow-y: auto;
    border-radius: 8px;
    line-height: 1.4;
}
</style>
</html>
